name: netshop_flutter
description: MLM e-commerce partner portal home screen
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  image_picker: ^1.1.1
  http: ^1.2.2
  crypto: ^3.0.3
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  pusher_channels_flutter: ^2.3.0
  pusher_client: ^2.0.0
  page_flip: ^0.2.5
  video_player: ^2.9.1
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.0
  razorpay_flutter: ^1.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon2.png"
  adaptive_icon_background: "#ffffff"